appId: com.mynote.app
productName: MyNote
copyright: Copyright © 2026

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: MyNote

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  artifactName: ${productName}-${version}.${ext}

linux:
  target:
    - AppImage
    - deb
  icon: resources/icon.png
  category: Office

extraResources:
  - from: resources/
    to: resources/
